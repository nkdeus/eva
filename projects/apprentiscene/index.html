<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApprentisScene - Style Guide</title>
  <link rel="stylesheet" href="render/apprentiscene.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>
<body class="current-theme theme-apprentiscene all-grads _bg-light p-80">

  <!-- COLORS -->
  <section class="mb-128">
    <h2 class="fs-128 fw-700 uppercase ta-c mb-40">Colors</h2>

    <div class="d-f fw-w jc-c gap-40">
      <!-- Rangée 1 -->
      <div class="w-160 h-160 br-50 _bg-pink"></div>
      <div class="w-160 h-160 br-50 _bg-magenta"></div>
      <div class="w-160 h-160 br-50 _bg-cyan"></div>
      <div class="w-160 h-160 br-50 _bg-blue"></div>
    </div>

    <div class="d-f fw-w jc-c gap-40 mt-40">
      <!-- Rangée 2 -->
      <div class="w-160 h-160 br-50 _bg-purple"></div>
      <div class="w-160 h-160 br-50 _bg-blueViolet"></div>
      <div class="w-160 h-160 br-50 _bg-indigo"></div>
      <div class="w-160 h-160 br-50 _bg-teal"></div>
    </div>
  </section>

  <!-- SIZES -->
  <section class="mb-128">
    <h2 class="fs-128 fw-700 uppercase ta-c mb-40">Sizes</h2>

    <div class="d-f fw-w jc-c ai-e gap-80">
      <div class="w-440 h-440 _bg-dark"></div>
      <div class="w-320 h-320 _bg-dark"></div>
      <div class="w-160 h-160 _bg-dark"></div>
      <div class="w-128 h-128 _bg-dark"></div>
      <div class="w-80 h-80 _bg-dark"></div>
      <div class="w-40 h-40 _bg-dark"></div>
      <div class="w-30 h-30 _bg-dark"></div>
      <div class="w-20 h-20 _bg-dark"></div>
      <div class="w-16 h-16 _bg-dark"></div>
    </div>
  </section>

  <!-- FONT SIZES -->
  <section class="mb-128">
    <h2 class="fs-128 fw-700 uppercase ta-c mb-40">Font Sizes</h2>

    <div class="d-f fw-w jc-c ai-e gap-80 fw-500 uppercase">
      <span class="fs-280">280</span>
      <span class="fs-128">128</span>
      <span class="fs-80">80</span>
      <span class="fs-64">64</span>
      <span class="fs-40">40</span>
      <span class="fs-36">36</span>
      <span class="fs-32">32</span>
      <span class="fs-28">28</span>
      <span class="fs-24">24</span>
      <span class="fs-20">20</span>
      <span class="fs-16">16</span>
      <span class="fs-12">12</span>
    </div>
  </section>

</body>
</html>
